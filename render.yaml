services:
  - type: web
    name: filmdb
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: python server.py
    envVars:
      - key: GEMINI_API_KEY
        sync: false
      - key: SHEETS_CREDS
        sync: false
      - key: SPREADSHEET_ID
        value: 1sRXiN_W8oshYIZTaDza3A-B1MPgrpTmedoQx8VS9Dsw
      - key: TMDB_API_KEY
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: RESEND_FROM_EMAIL
        sync: false
      - key: ADMIN_API_KEY
        sync: false
      - key: APP_LOGIN_URL
        sync: false
