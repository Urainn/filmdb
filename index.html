<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FilmDB — 電影預告片資料庫</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #0e0e0f; --surface: #161618; --surface2: #1e1e21; --surface3: #252528;
  --border: rgba(255,255,255,0.06); --border2: rgba(255,255,255,0.12);
  --text: #e8e6e1; --text2: #888680; --text3: #4a4845;
  --accent: #d4f27a; --accent-dim: rgba(212,242,122,0.1); --accent-text: #1a2600;
  --red: #f27a7a; --red-dim: rgba(242,122,122,0.08);
  --blue: #7ab8f2; --blue-dim: rgba(122,184,242,0.08);
  --amber: #f2c97a;
  --radius: 8px; --radius-lg: 12px;
}
html { font-size: 14px; }
body { font-family: 'Noto Sans TC', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
.layout { display: grid; grid-template-columns: 220px 1fr; min-height: 100vh; }
.sidebar { background: var(--surface); border-right: 1px solid var(--border); display: flex; flex-direction: column; position: sticky; top: 0; height: 100vh; overflow-y: auto; }
.sidebar-top { padding: 20px; border-bottom: 1px solid var(--border); }
.logo { font-family: 'DM Mono', monospace; font-size: 13px; font-weight: 500; color: var(--accent); letter-spacing: 0.05em; }
.logo-sub { font-size: 10px; color: var(--text3); font-family: 'DM Mono', monospace; margin-top: 2px; }
.server-bar { display: flex; align-items: center; gap: 7px; padding: 7px 18px; font-size: 10.5px; font-family: 'DM Mono', monospace; border-bottom: 1px solid var(--border); }
.dot { width: 7px; height: 7px; border-radius: 50%; background: var(--text3); flex-shrink: 0; }
.dot.ok { background: var(--accent); box-shadow: 0 0 5px rgba(212,242,122,0.4); }
.dot.err { background: var(--red); }
.dot.checking { background: var(--amber); animation: pulse 1s ease infinite; }
@keyframes pulse { 0%,100%{opacity:1}50%{opacity:0.3} }
.nav { padding: 10px 0; flex: 1; }
.nav-label { font-size: 9px; font-family: 'DM Mono', monospace; letter-spacing: 0.12em; color: var(--text3); text-transform: uppercase; padding: 8px 18px 4px; }
.nav-item { display: flex; align-items: center; gap: 9px; padding: 8px 18px; font-size: 12.5px; color: var(--text2); cursor: pointer; border-left: 2px solid transparent; transition: all 0.12s; user-select: none; }
.nav-item:hover { color: var(--text); background: rgba(255,255,255,0.025); }
.nav-item.active { color: var(--accent); border-left-color: var(--accent); background: var(--accent-dim); }
.ni { width: 14px; flex-shrink: 0; opacity: 0.55; }
.nav-item.active .ni { opacity: 1; }
.sidebar-foot { padding: 14px 18px; border-top: 1px solid var(--border); }
.stat { display: flex; justify-content: space-between; font-size: 10px; font-family: 'DM Mono', monospace; color: var(--text3); padding: 1.5px 0; }
.stat span:last-child { color: var(--text2); }
.main { padding: 28px 32px; min-height: 100vh; }
.page-head { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 22px; gap: 16px; }
.page-title { font-size: 18px; font-weight: 500; letter-spacing: -0.02em; }
.page-sub { font-size: 11px; color: var(--text2); margin-top: 2px; }
.panel { display: none; }
.panel.active { display: block; animation: fi 0.15s ease; }
@keyframes fi { from{opacity:0;transform:translateY(3px)}to{opacity:1;transform:none} }
.btn { display: inline-flex; align-items: center; gap: 5px; padding: 7px 13px; border-radius: var(--radius); font-size: 12px; font-weight: 500; cursor: pointer; border: 1px solid var(--border2); background: var(--surface2); color: var(--text); transition: all 0.12s; font-family: inherit; white-space: nowrap; }
.btn:hover { background: var(--surface3); border-color: rgba(255,255,255,0.18); }
.btn:active { transform: scale(0.98); }
.btn:disabled { opacity: 0.38; cursor: not-allowed; transform: none !important; }
.btn-accent { background: var(--accent); color: var(--accent-text); border-color: var(--accent); font-weight: 700; }
.btn-accent:hover { background: #c9eb6c; }
.btn-danger { color: var(--red); border-color: rgba(242,122,122,0.18); }
.btn-danger:hover { background: var(--red-dim); }
.btn-sm { padding: 4px 9px; font-size: 11px; }
.btn-row { display: flex; gap: 7px; flex-wrap: wrap; }
.search-row { display: flex; gap: 8px; margin-bottom: 18px; }
.search-inp { flex: 1; background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius); padding: 8px 12px; color: var(--text); font-size: 13px; font-family: inherit; outline: none; }
.search-inp::placeholder { color: var(--text3); }
.search-inp:focus { border-color: var(--border2); }
.tbl-wrap { overflow-x: auto; }
table { width: 100%; border-collapse: collapse; font-size: 12px; }
thead tr { border-bottom: 1px solid var(--border); }
th { text-align: left; padding: 7px 10px; font-size: 9.5px; font-family: 'DM Mono', monospace; letter-spacing: 0.1em; color: var(--text3); text-transform: uppercase; font-weight: 400; white-space: nowrap; }
td { padding: 9px 10px; border-bottom: 1px solid var(--border); vertical-align: middle; color: var(--text2); }
tbody tr:hover td { background: rgba(255,255,255,0.015); }
.td-title { color: var(--text); font-weight: 500; font-size: 12.5px; }
.td-mono { font-family: 'DM Mono', monospace; font-size: 10px; }
.td-acts { display: flex; gap: 3px; }
.chips { display: flex; flex-wrap: wrap; gap: 3px; }
.chip { font-size: 10px; padding: 1px 6px; border-radius: 99px; border: 1px solid var(--border); color: var(--text3); font-family: 'DM Mono', monospace; }
.chip.sc { border-color: rgba(122,184,242,0.28); color: var(--blue); }
.chip.gn { border-color: rgba(212,242,122,0.28); color: var(--accent); }
.chip.md { border-color: rgba(242,201,122,0.28); color: var(--amber); }
.thumb { width: 60px; height: 34px; object-fit: cover; border-radius: 4px; background: var(--surface2); display: block; cursor: pointer; }
.field { margin-bottom: 11px; }
.fl { display: block; font-size: 9.5px; font-family: 'DM Mono', monospace; letter-spacing: 0.08em; color: var(--text3); text-transform: uppercase; margin-bottom: 4px; }
.fi, .fta { width: 100%; background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius); padding: 8px 11px; color: var(--text); font-size: 12.5px; font-family: inherit; outline: none; }
.fi:focus, .fta:focus { border-color: var(--border2); }
.fta { resize: vertical; min-height: 56px; line-height: 1.5; }
.f2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.fhint { font-size: 10.5px; color: var(--text3); margin-top: 3px; }
.steps { display: flex; flex-direction: column; gap: 14px; max-width: 580px; }
.step { background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 18px; transition: border-color 0.2s; }
.step.s-active { border-color: rgba(212,242,122,0.35); }
